# ── 1. Namespace ──────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: krzak-pol-magazyn

---
# ── 2. PersistentVolumeClaim 2GB ──────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-prezesa
  namespace: krzak-pol-magazyn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi

---
# ── 3. Deployment busybox z podmontowanym wolumenem ───────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-magazyn
  namespace: krzak-pol-magazyn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-magazyn
  template:
    metadata:
      labels:
        app: busybox-magazyn
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          volumeMounts:
            - name: magazyn-prezesa
              mountPath: /dane_prezesa
      volumes:
        - name: magazyn-prezesa
          persistentVolumeClaim:
            claimName: pvc-prezesa